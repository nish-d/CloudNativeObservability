## Extensions
extensions:
  health_check:
    # TODO: Task 3 - environment variable
    endpoint: ${env:POD_IP}:13133
  k8s_leader_elector/k8s_cluster:
    auth_type: serviceAccount
    lease_name: k8s.cluster.receiver.opentelemetry.io
    lease_namespace: books-ns
    
## Processors
processors:
  probabilistic_sampler:
    sampling_percentage: 50  # only forward 50% of logs
  batch: 
    send_batch_size: 1000
    timeout: 10s
    send_batch_max_size: 2000
  k8sattributes:
    extract:
      metadata:
      - k8s.namespace.name
      - k8s.pod.name
      - k8s.pod.uid
      - k8s.node.name
      - k8s.pod.start_time
      - k8s.deployment.name
      - k8s.replicaset.name
      - k8s.replicaset.uid
      - k8s.daemonset.name
      - k8s.daemonset.uid
      - k8s.job.name
      - k8s.job.uid
      - k8s.container.name
      - k8s.cronjob.name
      - k8s.statefulset.name
      - k8s.statefulset.uid
      - container.image.tag
      - container.image.name
      - k8s.cluster.uid
      - service.namespace
      - service.name
      - service.version
      - service.instance.id
      otel_annotations: true
      labels:
      - from: pod
        key_regex: (.*)
        tag_name: $$1
    filter:
      # TODO: Task 3 - environment variable
      node_from_env_var: NODE_NAME
    passthrough: false
    pod_association:
    - sources:
      - from: resource_attribute
        name: k8s.pod.ip
    - sources:
      - from: resource_attribute
        name: k8s.pod.uid
    - sources:
      - from: connection
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
    
## Receivers
receivers:
  filelog:
    exclude:
    - /var/log/pods/node-otelcol_my-otel-collector-opentelemetry-collector*_*/opentelemetry-collector/*.log
    include:
    - /var/log/pods/*/*/*.log

    start_at: end
    retry_on_failure:
      enabled: true

    include_file_name: false
    # required for metadata extraction
    include_file_path: true

    operators:
    - type: container
      # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/pkg/stanza/docs/operators/container.md
      add_metadata_from_filepath: true

  hostmetrics:
    collection_interval: 10s
    root_path: /hostfs
    #https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/hostmetricsreceiver/README.md
    scrapers:
      cpu: 
      memory: 
      load: 
        cpu_average: true
      network: null
      filesystem:
        exclude_fs_types:
          fs_types:
          - autofs
          - binfmt_misc
          - bpf
          - cgroup2
          - configfs
          - debugfs
          - devpts
          - devtmpfs
          - fusectl
          - hugetlbfs
          - iso9660
          - mqueue
          - nsfs
          - overlay
          - proc
          - procfs
          - pstore
          - rpc_pipefs
          - securityfs
          - selinuxfs
          - squashfs
          - sysfs
          - tracefs
          match_type: strict
        exclude_mount_points:
          match_type: regexp
          mount_points:
          - /dev/*
          - /proc/*
          - /sys/*
          - /run/k3s/containerd/*
          - /var/lib/docker/*
          - /var/lib/kubelet/*
          - /snap/*

  k8s_cluster:
    collection_interval: 10s
    k8s_leader_elector: k8s_leader_elector/k8s_cluster

  kubeletstats:
    auth_type: serviceAccount
    collection_interval: 20s
    # TODO: Task 3 - environment variable
    endpoint: ${env:NODE_IP}:10250
    insecure_skip_verify: true

  otlp:
    protocols:
      grpc: 
        endpoint: 0.0.0.0:4317
      http: 
        endpoint: 0.0.0.0:4318

## Exporters
exporters:
  debug:
    verbosity: detailed
  otlp/traces:
    # TODO: Task 3 - Gateway collector endpoint
    endpoint: __GATEWAY_COLLECTOR_HERE__

    tls:
      insecure: true
  otlp/metrics:
    # TODO: Task 3 - Gateway collector endpoint
    endpoint: __GATEWAY_COLLECTOR_HERE__

    tls:
      insecure: true
  otlp/logs:
    # TODO: Task 3 - Gateway collector endpoint
    endpoint: __GATEWAY_COLLECTOR_HERE__

    tls:
      insecure: true

## Service
service:
  pipelines:
    logs:
      receivers: [ otlp, filelog ]
      processors: [ probabilistic_sampler, k8sattributes, memory_limiter, batch ]
      exporters: [ debug, otlp/logs ]

    metrics:
      receivers: [ otlp, hostmetrics, kubeletstats, k8s_cluster ]
      processors: [ k8sattributes, memory_limiter, batch ]
      exporters: [ debug, otlp/metrics ]

    traces:
      receivers: [ otlp ]
      processors: [ k8sattributes, memory_limiter, batch ]
      exporters: [ debug, otlp/traces ]

#  telemetry:
#    metrics:
#      readers:
#      - pull:
#          exporter:
#            prometheus:
#              host: ${env:MY_POD_IP}
#              port: 8888

  extensions:
  - health_check
  - k8s_leader_elector/k8s_cluster

