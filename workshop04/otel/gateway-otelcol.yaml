---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: gateway
  namespace: books-ns
spec:
  mode: deployment
  replicas: 1
  image: otel/opentelemetry-collector-contrib:latest
  imagePullPolicy: IfNotPresent
  serviceAccount: otel-collector-sa
  resources:
    requests:
      memory: 1024Mi
      cpu: 200m
    limits:
      memory: 1024Mi
      cpu: 200m
  config:
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      zpages:
        # view /debug/tracez
        endpoint: 0.0.0.0:55679

    connectors:
      spanmetrics:
        histogram:
          explicit:
            buckets: [ 2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s, 15s ]
        exemplars:
          enabled: true
        dimensions:
          - name: http.method
          - name: http.route
          - name: http.status_code
        aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"

    # Processors
    processors:
      batch: { }
      memory_limiter:
        # maximum memory usage
        limit_mib: 512
        # Maximum spike between measured memory usage
        # Triggers GC
        spike_limit_mib: 410
        # check every 5s, default is 1s
        check_interval: 5

      transform:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - set(resource.attributes["severity"], "warn")
              - set(resource.attributes["severity"], log.severity_text)
              - set(resource.attributes["service.name"], attributes["service.name"])
              - set(resource.attributes["service.version"], attributes["service.version"])

    # Receivers - otlp
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # TODO: Task 5 - Use service discovery to scrape application metrics
      prometheus/sd:
        config:
          scrape_configs:
          - job_name: sd-pods
              #scrape all the pods
            kubernetes_sd_configs:
            - role: pod
                  #specify what metadata to scrape
            relabel_configs:
                # annotation prometheus.io/scrape: true
                - source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_scrape ]
                  regex: true
                  action: keep
                  # annotation prometheus.io/path: metrics
                - source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_path ]
                  action: replace
                  regex: (.+)
                  replacement: $1
                  target_label: __metrics_path__
                  # annotation prometheus.io/port: 5050
                - source_labels: [ __address__; __meta_kubernetes_pod_annotation_prometheus_io_port ]
                  action: replace
                  regex: (.+):(\d+);(\d+)
                  replacement: $1:$3
                  target_label: __address__
                  # label : app.kubernetes.io/name
                - source_labels: [ __meta_kubernetes_pod_label_app_kubernetes_io_name ]
                  action: replace
                  regex: (.+)
                  replacement: $1
                  target_label: service.name
                  # label: app.kubernetes.io./version
                - source_labels: [ __meta_kubernetes_pod_label_app_kubernetes_io_version ]
                  action: replace
                  regex: (.+)
                  replacement: $1
                  target_label: service.version
                  # metadata.namespace
                - source_labels: [ __meta_kubernetes_pod_namespace ]
                  action: replace
                  regex: (.+)
                  replacement: $1
                  target_label: env

    # Exporters - for Loki, Tempo, Prometheus, debug
    exporters:

      # TODO: Task 5 - configure Prometheus remote write endpoint - /api/v1/write
      prometheusremotewrite:
        endpoint: http://prom-stack-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
        tls:
          insecure: true

      prometheus:
        endpoint: 0.0.0.0:9090
        send_timestamps: true
        metric_expiration: 180m
        resource_to_telemetry_conversion:
          enabled: false
        enable_open_metrics: true

      otlphttp/loki:
        # TODO: Task 2 - configure Loki endpoint : Done
        # FQDN
        endpoint: http://loki.loki.svc.cluster.local:3100/otlp
        tls:
          insecure: true

      otlp/tempo:
        # TODO: Task 2 - configure Tempo endpoint: Done
        endpoint: tempo.tempo.svc.cluster.local:4317
        tls:
          insecure: true

      debug:
        # basic, normal, detailed
        verbosity: detailed
        sampling_initial: 1
        sampling_thereafter: 100

    # Service pipeline
    service:
      extensions: [ health_check, zpages ]
      # Uncomment to display otel debug messages
      #telemetry:
      #  logs:
      #    level: debug
      pipelines:

        metrics:
          # TODO: Task 5 - Add service discovery to metrics pipeline
          #receivers: [ otlp, prometheus/sd, spanmetrics,  ]
          receivers: [ prometheus/sd, spanmetrics ]
          processors: [ batch, memory_limiter ]
          # TODO: Task 2 - Add prometheusremotewrite exporter
          exporters: [ debug, prometheusremotewrite ]

        logs:
          receivers: [ otlp ]
          processors: [ batch, memory_limiter, transform ]
          exporters: [ otlphttp/loki, debug ]

        traces:
          receivers: [ otlp ]
          processors: [ batch, memory_limiter ]
          exporters: [ otlp/tempo, debug, spanmetrics ]


