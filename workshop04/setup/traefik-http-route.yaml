
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik-httproute
  namespace: traefik
spec:
  hostnames:
  #TODO: Task 1 change the TRAEFIK_IP to the load balancer IP address
  - traefik-104.248.98.110.nip.io
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
    port: 8000
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: traefik
      port: 8080

